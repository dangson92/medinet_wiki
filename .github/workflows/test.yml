name: CI — Critical path test (HARD-03)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: API critical path test
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Hub_All/api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: medinet
          POSTGRES_PASSWORD: medinet_ci_pwd
          POSTGRES_DB: medinet_central
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medinet -d medinet_central"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: |
            Hub_All/api/uv.lock
            Hub_All/api/pyproject.toml

      - name: Sync deps
        run: uv sync --extra dev --frozen

      - name: Bootstrap 4 DB cho per-hub Alembic (Plan 01 init-db.sh equivalent)
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: medinet
          PGPASSWORD: medinet_ci_pwd
        working-directory: Hub_All
        run: |
          # CI service container postgres KHONG mount init-db.sh - bootstrap thu cong
          # 3 DB hub con + CREATE EXTENSION vector (central da co qua POSTGRES_DB env)
          for db in medinet_central medinet_hub_yte medinet_hub_duoc medinet_hub_hcns; do
            psql -d postgres -c "SELECT 1 FROM pg_database WHERE datname='$db'" -tA | grep -q 1 || \
              psql -d postgres -c "CREATE DATABASE $db OWNER medinet"
            psql -d "$db" -c "CREATE EXTENSION IF NOT EXISTS vector"
          done
          echo "[ci-bootstrap] 4 DB ready."

      - name: Ruff check
        run: uv run ruff check app tests

      - name: Mypy strict (critical modules)
        run: |
          uv run mypy --strict app/auth app/middleware app/observability \
            app/services/search_service.py app/services/documents_service.py \
            app/services/ask_service.py app/repositories/hub_isolation.py \
            app/logging_config.py
        continue-on-error: false

      - name: Pytest critical path with coverage gate
        env:
          # testcontainers tự spin Postgres + Redis qua Docker socket
          # GitHub Actions runner ubuntu-22.04 đã có Docker pre-installed
          TC_HOST: localhost
          # OpenAI key placeholder cho test mock (Plan 10-03 Test 5)
          OPENAI_API_KEY: sk-test-placeholder
          GEMINI_API_KEY: gemini-test-placeholder
        run: |
          uv run pytest -m critical -m integration \
            tests/integration/test_critical_path_coverage.py \
            --cov=app.auth \
            --cov=app.routers.auth \
            --cov=app.routers.hubs \
            --cov=app.routers.documents \
            --cov=app.routers.search \
            --cov=app.routers.ask \
            --cov=app.services.documents_service \
            --cov=app.services.search_service \
            --cov=app.services.ask_service \
            --cov=app.repositories.hub_isolation \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50 \
            -v --tb=short

      - name: Apply migrate-all + verify head SHA match (TOPO-02, R-V3-3 mitigation)
        env:
          DATABASE_URL: postgresql+asyncpg://medinet:medinet_ci_pwd@localhost:5432/medinet_central
          COCOINDEX_DATABASE_URL: postgresql://medinet:medinet_ci_pwd@localhost:5432/medinet_central
          REDIS_URL: redis://localhost:6379/0
          HUB_NAME: central
          # JWT keys placeholder (test mode - Plan 03 v2.0 generate keys runtime)
          JWT_PRIVATE_KEY_PATH: ./keys/private.pem
          JWT_PUBLIC_KEY_PATH: ./keys/public.pem
        # working-directory default Hub_All/api (preserve M2) - make migrate-all chay tu api/
        run: |
          # Generate keys neu missing (CI fresh runner)
          bash scripts/generate_keys.sh 2>/dev/null || true
          # Apply 4 DB tuan tu + verify head SHA match (migrate-all wired alembic-head-check.sh)
          make migrate-all

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Hub_All/api/coverage.xml
          retention-days: 30
          if-no-files-found: ignore
