# Alembic configuration for Medinet Wiki API M2.
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# NOTE: sqlalchemy.url is NOT set here. env.py reads it at runtime from
# app.config.get_settings().database_url so each env (dev/test/prod) uses
# its own DSN without editing this ini file.
#
# IMPORTANT: This file is read by configparser with "locale" encoding on
# some platforms (Windows cp1252). Keep this file pure ASCII to avoid
# UnicodeDecodeError. Vietnamese commentary lives in env.py + docs.

[alembic]
script_location = migrations
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
