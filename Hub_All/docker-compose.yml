name: medinet-wiki

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medinet-postgres
    environment:
      POSTGRES_DB: medinet_central
      POSTGRES_USER: medinet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medinet_dev_pwd}
    volumes:
      - medinet_pgdata:/var/lib/postgresql/data
      - ./api/scripts/init-db.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinet -d medinet_central"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [medinet_net]

  redis:
    image: redis:7-alpine
    container_name: medinet-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - medinet_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [medinet_net]

  python-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: medinet-api
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://medinet:${POSTGRES_PASSWORD:-medinet_dev_pwd}@postgres:5432/medinet_central
      COCOINDEX_DATABASE_URL: postgresql://medinet:${POSTGRES_PASSWORD:-medinet_dev_pwd}@postgres:5432/medinet_cocoindex
      REDIS_URL: redis://redis:6379/0
      APP_NAMESPACE: medinet_prod
      COCOINDEX_DB_SCHEMA: cocoindex
      JWT_PRIVATE_KEY_PATH: /keys/private.pem
      JWT_PUBLIC_KEY_PATH: /keys/public.pem
      FILE_STORE_DIR: /file_store
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Gap SC5: ép cocoindex LMDB state vào thư mục tuyệt đối writable trong container.
      # environment: thắng env_file → host (native) vẫn dùng .cocoindex/ tương đối.
      COCOINDEX_DB: /app/.cocoindex/state.lmdb
      COCOINDEX_LMDB_PATH: /app/.cocoindex/state.lmdb
    volumes:
      - ./api/keys:/keys:ro
      - ./file_store:/file_store
      - medinet_cocoindex_state:/app/.cocoindex
    # Host 8180 → container 8080. Frontend `api.ts` hardcode port 8180
    # (Hyper-V excluded range 8038-8137 trên Windows). Container nội bộ +
    # Dockerfile EXPOSE/uvicorn vẫn 8080 — chỉ map ở compose (D6: KHÔNG sửa frontend).
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [medinet_net]

  # MCP Service — Phase 8.3. Process độc lập expose RAG tools qua MCP cho Claude
  # web connector. KHÔNG map port host: chỉ Caddy expose public (mọi truy cập
  # buộc đi qua TLS termination). Service nói HTTP nội bộ docker network.
  mcp_service:
    build:
      context: ./mcp_service
      dockerfile: Dockerfile
    container_name: medinet-mcp
    restart: unless-stopped
    env_file:
      # Optional — operator copy mcp_service/.env.example -> .env nếu cần override.
      # Mọi biến bắt buộc đã có default ở environment: dưới đây nên thiếu .env vẫn chạy.
      - path: ./mcp_service/.env
        required: false
    environment:
      # Gọi API Service qua docker network — KHÔNG localhost.
      MCP_API_BASE_URL: http://python-api:8080
      # Issuer = domain public HTTPS. Operator set ở .env gốc compose:
      #   MCP_OAUTH_ISSUER_URL=https://${MCP_PUBLIC_DOMAIN}  (prod).
      # Đổi reverse proxy (Caddy <-> Cloudflare Tunnel) chỉ cần đổi biến này.
      MCP_OAUTH_ISSUER_URL: ${MCP_OAUTH_ISSUER_URL:-http://localhost:8190}
      # SQLite OAuth state — đường dẫn tuyệt đối trong named volume (sống sót restart).
      MCP_OAUTH_STATE_DB_PATH: /app/.oauth/state.db
    volumes:
      - medinet_mcp_oauth_state:/app/.oauth
    depends_on:
      python-api:
        condition: service_healthy
    networks: [medinet_net]

  # Reverse proxy auto-TLS — Phase 8.3. Caddy terminate TLS + forward nguyên
  # host tới mcp_service:8190 (well-known route ở root KHÔNG bị strip).
  # Operator set MCP_PUBLIC_DOMAIN ở .env gốc compose (vd mcp.medinet.vn).
  # Fallback nếu không mở được port 80/443: thay service này bằng cloudflared.
  caddy:
    image: caddy:2-alpine
    container_name: medinet-caddy
    restart: unless-stopped
    environment:
      MCP_PUBLIC_DOMAIN: ${MCP_PUBLIC_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - medinet_caddy_data:/data
      - medinet_caddy_config:/config
    depends_on:
      - mcp_service
    networks: [medinet_net]

volumes:
  medinet_pgdata:
  medinet_redis_data:
  medinet_cocoindex_state:
  # Phase 8.3 — OAuth state SQLite (clients/codes/tokens/pending) sống sót restart.
  medinet_mcp_oauth_state:
  # Phase 8.3 — Caddy cert ACME + config (tránh xin lại cert mỗi lần restart).
  medinet_caddy_data:
  medinet_caddy_config:

networks:
  medinet_net:
    driver: bridge
